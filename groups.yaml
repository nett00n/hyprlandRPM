---
_starter-pack:
  label: Hyprland new user starter-pack
  packages:
  - hypridle
  - Hyprland
  - hyprland-guiutils
  - hyprlock
  - hyprpaper
  - Hyprshot
  - Waybar
  packages_from_global_repo:
  - name: wofi
    summary: Wofi is a launcher/menu program for wlroots based wayland compositors such as sway
  - name: swaync
    summary: A simple GTK based notification daemon for any Wayland compositor
hyprland:
  badge:
    color: 33CCFF
    logo: hyprland
    logo_color: black
  label: Hyprland main packages
  packages:
  - hypridle
  - Hyprland
  - Hyprland-git
  - hyprland-guiutils
  - hyprland-plugins
  - hyprland-plugins-git
  - hyprland-qt-support
  - hyprlauncher
  - hyprlock
  - hyprpaper
  - hyprpicker
  - hyprpolkitagent
  - hyprpwcenter
  - hyprqt6engine
  - Hyprshot
  - hyprshutdown
  - hyprsunset
  - hyprsysteminfo
  - xdg-desktop-portal-hyprland
hyprland-deps:
  badge:
    color: 33CCFF
    logo: hyprland
    logo_color: black
  label: Hyprland dependencies
  packages:
  - aquamarine
  - hyprcursor
  - hyprgraphics
  - hyprland-protocols
  - hyprland-qt-support
  - hyprlang
  - hyprtoolkit
  - hyprutils
  - hyprwayland-scanner
  - hyprwire
other-apps:
  label: Useful apps
  packages:
  - pyprland
  - Waybar
  - Waybar-git
  - cliphist
  - cliphist-git
  - ashell
  packages_from_global_repo:
  - name: swaybg
    summary: Great utility if all you want is one simple static wallpaper
  - name: bemenu
    summary: Dynamic menu library and client program inspired by dmenu
  - name: fuzzel
    summary: App launcher and fuzzy finder for Wayland, inspired by rofi and dmenu
  - name: clipman
    summary: A simple clipboard manager for Wayland
  - name: copyq
    summary: CopyQ is an advanced clipboard manager with powerful editing and scripting features.
  - name: nnn
    summary: n³ The unorthodox terminal file manager
  - name: ranger
    summary: A VIM-inspired filemanager for the console
  - name: network-manager-applet
    summary: Tray applet and an advanced network connection editor
  - name: gammastep
    summary: Adjust the color temperature of your screen according to your surroundings. This may help your eyes hurt less if you are working in front of the screen at night.
other-deps:
  label: Other dependencies
  packages:
  - aylurs-gtk-shell
  - glaze
  - gtk4-layer-shell
  - sndio
  - cava
