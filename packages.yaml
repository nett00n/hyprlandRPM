    prep_commands:
      - "pushd cli"
      - "tar xf %{SOURCE1}"
      - "popd"
    build_requires:
      - gcc-c++
      - gjs
      - golang
      - gtk4-layer-shell-devel
      - meson
      - ninja-build
    files:
      - "%doc README.md"
      - "%license LICENSE"
      - "%{_prefix}/bin/ags"
      - "%{_prefix}/share/ags/"

