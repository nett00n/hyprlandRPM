---
aquamarine:
  build:
    system: cmake
  build_requires:
  - cmake
  - gcc-c++
  - hyprutils-devel
  - hyprwayland-scanner-devel
  - ninja-build
  - pkgconfig(gbm)
  - pkgconfig(gl)
  - pkgconfig(glesv2)
  - pkgconfig(hwdata)
  - pkgconfig(libdisplay-info)
  - pkgconfig(libdrm)
  - pkgconfig(libinput)
  - pkgconfig(libseat)
  - pkgconfig(libudev)
  - pkgconfig(pixman-1)
  - pkgconfig(wayland-client)
  - pkgconfig(wayland-protocols)
  depends_on:
  - hyprutils
  - hyprwayland-scanner
  description: |
    Aquamarine is a very light linux rendering backend library.
    It provides basic abstractions for an application to render on a
    Wayland session (in a window) or a native DRM sessionIt is agnostic of
    the rendering API (Vulkan/OpenGL) and designed to be lightweight,
    performant, and minimalAquamarine provides no bindings for other
    languages. It is C++-only
  devel:
    files:
    - '%{_includedir}/aquamarine/'
    - '%{_libdir}/pkgconfig/aquamarine.pc'
  files:
  - '%license LICENSE'
  - '%{_libdir}/libaquamarine.so*'
  license: BSD-3-Clause
  release: '%autorelease'
  source:
    archives:
    - '%{url}/archive/refs/tags/v%{version}.tar.gz#/%{name}-%{version}.tar.gz'
  summary: A very light linux rendering backend library
  url: https://github.com/hyprwm/aquamarine
  version: 0.10.0
aylurs-gtk-shell:
  build:
    go_subdir: cli
    prep:
    - pushd cli
    - tar xf %{SOURCE1}
    - popd
    system: meson
  build_requires:
  - gcc-c++
  - gjs
  - golang
  - gtk4-layer-shell-devel
  - meson
  - ninja-build
  depends_on:
  - gtk4-layer-shell
  description: |
    Scaffolding CLI tool for Astal+Gnim projects.
    Astal is a set of libraries written in Vala/C that makes writing a
    Desktop Shell easy. Gnim is a library which introduces JSX to GJS.
    GJS is a JavaScript runtime built on Firefox's SpiderMonkey JavaScript
    engine and the GNOME platform libraries, the same runtime GNOME Shell runs
    on
  files:
  - '%doc README.md'
  - '%license LICENSE'
  - '%{_prefix}/bin/ags'
  - '%{_prefix}/share/ags/'
  license: GPL-3.0-or-later
  release: '%autorelease'
  source:
    archives:
    - '%{url}/archive/refs/tags/v%{version}.tar.gz#/%{name}-%{version}.tar.gz'
    - '%{name}-%{version}-vendor.tar.gz'
    name: ags
  summary: Scaffolding CLI for Astal+Gnim
  url: https://github.com/Aylur/ags
  version: 3.1.1
cava:
  build:
    no_lto: true
    subdir: ''
    system: cmake
  build_requires:
  - alsa-lib-devel
  - cmake
  - fftw-devel
  - gcc-c++
  - iniparser-devel
  - jack-audio-connection-kit-devel
  - make
  - ncurses-devel
  - ninja-build
  - pipewire-devel
  - portaudio-devel
  - pulseaudio-libs-devel
  - sdl2-compat-devel
  - sndio-devel
  depends_on:
  - sndio
  description: Cross-platform Audio Visualizer E
  files:
  - '%doc README.md'
  - '%license LICENSE'
  license: MIT
  release: '%autorelease'
  rpm:
    no_debug_package: true
  source:
    archives:
    - '%{url}/archive/refs/tags/%{version}.tar.gz#/%{name}-%{version}.tar.gz'
    name: ''
  summary: Cross-platform Audio Visualizer
  url: https://github.com/karlstav/cava
  version: 0.10.7
glaze:
  build:
    commands:
    - '%cmake -DBUILD_TESTING=OFF'
    - '%cmake_build'
    system: cmake
  build_requires:
  - cmake
  - gcc-c++
  - libasan
  - libubsan
  - ninja-build
  description: |
    One of the fastest JSON libraries in the world. Glaze reads and
    writes from object memory, simplifying interfaces and offering incredible
    performance
  devel:
    files:
    - '%{_prefix}/include/glaze/'
    - '%{_prefix}/share/glaze/*.cmake'
  files:
  - '%doc README.md'
  - '%license LICENSE'
  license: MIT
  release: '%autorelease'
  rpm:
    no_debug_package: true
  source:
    archives:
    - '%{url}/archive/refs/tags/v%{version}.tar.gz#/%{name}-%{version}.tar.gz'
  summary: Extremely fast, in memory, JSON and reflection library for modern C++.
  url: https://github.com/stephenberry/glaze
  version: 7.1.0
gtk4-layer-shell:
  build:
    system: meson
  build_requires:
  - gcc-c++
  - glib2-devel
  - gobject-introspection-devel
  - gtk4-devel
  - meson
  - ninja-build
  - pkgconfig(wayland-protocols)
  - vala
  description: |
    A library for using the Layer Shell and Session Lock Wayland protocols
    with GTK4. This Library is compatible with C, C++ and any language that
    supports GObject introspection files (Python, Vala, etc)The Layer Shell
    protocol allows building desktop shell components such as panels,
    notifications and wallpapers. It can be used to anchor your windows
    to a corner or edge of the output, or stretch them across the
    entire outputThe Session Lock protocol allows building lock screens
  devel:
    files:
    - '%{_prefix}/include/gtk4-layer-shell/gtk4-layer-shell.h'
    - '%{_prefix}/include/gtk4-layer-shell/gtk4-session-lock.h'
    - '%{_prefix}/lib64/pkgconfig/gtk4-layer-shell-0.pc'
    - '%{_prefix}/share/gir-1.0/Gtk4LayerShell-1.0.gir'
    - '%{_prefix}/share/gir-1.0/Gtk4SessionLock-1.0.gir'
    - '%{_prefix}/share/vala/vapi/gtk4-layer-shell-0.deps'
    - '%{_prefix}/share/vala/vapi/gtk4-layer-shell-0.vapi'
  files:
  - '%doc README.md'
  - '%license LICENSE'
  - '%{_prefix}/lib64/girepository-*/Gtk4LayerShell-*.typelib'
  - '%{_prefix}/lib64/girepository-*/Gtk4SessionLock-*.typelib'
  - '%{_prefix}/lib64/libgtk4-layer-shell.so*'
  - '%{_prefix}/lib64/liblayer-shell-preload.so'
  license: MIT
  release: '%autorelease'
  source:
    archives:
    - '%{url}/archive/refs/tags/v%{version}.tar.gz#/%{name}-%{version}.tar.gz'
  summary: A library to create panels and other desktop components for Wayland using the Layer Shell protocol and GTK4
  url: https://github.com/wmww/gtk4-layer-shell
  version: 1.3.0
